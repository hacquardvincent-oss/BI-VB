<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BiDash — Utilisateurs</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="hdr">
  <div id="logo">Bi<b>Dash</b></div>
  <span style="color:var(--t3);font-size:11px">Administration des utilisateurs</span>
  <div class="spacer"></div>
  <a class="btn" href="/app.html">← Reporting</a>
  <button class="btn" id="logout">Déconnexion</button>
</div>

<div class="wrap">
  <div class="card">
    <h3>Créer un utilisateur</h3>
    <div class="toolbar">
      <input id="nu" placeholder="Identifiant" style="background:var(--s2);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:7px">
      <input id="np" type="text" placeholder="Mot de passe" style="background:var(--s2);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:7px">
      <select id="nr" style="background:var(--s2);border:1px solid var(--br);color:var(--t);padding:8px 10px;border-radius:7px">
        <option value="user">Utilisateur</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn primary" id="create">Créer</button>
      <span class="err" id="err"></span>
    </div>
  </div>

  <div class="card">
    <h3>Utilisateurs</h3>
    <table><thead><tr><th>Identifiant</th><th>Rôle</th><th>Statut</th><th>Créé le</th><th>Actions</th></tr></thead>
    <tbody id="list"></tbody></table>
  </div>
</div>

<script>
const esc = s => (s||'').toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
async function guard(){ const r=await fetch('/auth/me'); if(!r.ok){location.href='/login.html';return null;} const u=await r.json(); if(u.role!=='admin'){location.href='/app.html';return null;} return u; }
async function load(){
  const r=await fetch('/api/users'); if(!r.ok)return;
  const users=await r.json();
  document.getElementById('list').innerHTML=users.map(u=>`<tr>
    <td>${esc(u.username)}</td>
    <td>${u.role}</td>
    <td>${u.active?'<span class="up">actif</span>':'<span class="dn">inactif</span>'}</td>
    <td>${new Date(u.created_at).toLocaleDateString('fr-FR')}</td>
    <td style="text-align:right">
      <button class="btn" onclick="toggle(${u.id},${!u.active})">${u.active?'Désactiver':'Activer'}</button>
      <button class="btn" onclick="resetPwd(${u.id})">MDP</button>
      <button class="btn" onclick="del(${u.id})" style="border-color:var(--r);color:var(--r)">Suppr.</button>
    </td></tr>`).join('');
}
async function create(){
  document.getElementById('err').textContent='';
  const username=document.getElementById('nu').value.trim();
  const password=document.getElementById('np').value;
  const role=document.getElementById('nr').value;
  const r=await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password,role})});
  if(r.ok){ document.getElementById('nu').value='';document.getElementById('np').value=''; load(); }
  else { const j=await r.json().catch(()=>({})); document.getElementById('err').textContent=j.error||'Erreur'; }
}
async function toggle(id,active){ await fetch(`/api/users/${id}/active`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})}); load(); }
async function resetPwd(id){ const p=prompt('Nouveau mot de passe :'); if(!p)return; await fetch(`/api/users/${id}/password`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p})}); alert('Mot de passe mis à jour'); }
async function del(id){ if(!confirm('Supprimer cet utilisateur ?'))return; await fetch(`/api/users/${id}`,{method:'DELETE'}); load(); }
document.getElementById('create').addEventListener('click',create);
document.getElementById('logout').addEventListener('click',async()=>{await fetch('/auth/logout',{method:'POST'});location.href='/login.html';});
(async()=>{ if(!(await guard()))return; load(); })();
</script>
</body>
</html>

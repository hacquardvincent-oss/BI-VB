<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BiDash — Reporting</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="hdr">
  <div id="logo">Bi<b>Dash</b></div>
  <span style="color:var(--t3);font-size:11px">Reporting e-commerce</span>
  <div class="spacer"></div>
  <span id="who" style="font-size:12px;color:var(--t2)"></span>
  <button class="btn" id="logout">Déconnexion</button>
</div>

<div class="wrap">
  <!-- BARRE DE MODULES -->
  <div class="card">
    <div class="toolbar" id="moduleBar"></div>
    <div class="note" id="modHint"></div>
  </div>

  <!-- COMPTES ÉQUIPE (admin + base active) -->
  <div class="card hidden" id="accountsCard">
    <h3>👥 Comptes équipe</h3>
    <div class="toolbar" style="flex-wrap:wrap;gap:8px">
      <input id="acUser" placeholder="identifiant" style="background:var(--bg2,#11142a);color:inherit;border:1px solid var(--bd,#2e3350);border-radius:6px;padding:6px 9px;font-size:12px">
      <input id="acPass" type="password" placeholder="mot de passe" style="background:var(--bg2,#11142a);color:inherit;border:1px solid var(--bd,#2e3350);border-radius:6px;padding:6px 9px;font-size:12px">
      <select id="acRole" style="background:var(--bg2,#11142a);color:inherit;border:1px solid var(--bd,#2e3350);border-radius:6px;padding:6px 9px;font-size:12px">
        <option value="user">Utilisateur</option>
        <option value="admin">Admin</option>
      </select>
      <button class="btn blue" id="acAdd">Ajouter / mettre à jour</button>
    </div>
    <div id="acList" style="margin-top:10px"></div>
    <div class="note" id="acNote"></div>
  </div>

  <!-- DÉPÔT DE FICHIERS -->
  <div class="card">
    <h3>Dépôt des fichiers</h3>
    <div class="note" id="persistNote"></div>
    <div class="grid sources" id="sources"></div>
    <div class="note" id="ingestNote"></div>
    <div id="ga4box" class="toolbar hidden" style="margin-top:10px">
      <button class="btn blue" id="ga4refresh">🔄 Rafraîchir GA4 (API)</button>
      <span class="note" id="ga4note">Importe sessions/canaux datés depuis GA4 → TT fiable par période</span>
    </div>
    <div id="wshopbox" class="toolbar hidden" style="margin-top:8px">
      <button class="btn blue" id="wshoprefresh">🔄 Importer OMS depuis WSHOP (API)</button>
      <span class="note" id="wshopnote">Récupère les commandes OMS via l'API WSHOP (plus besoin de déposer le CSV)</span>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="card">
    <div class="toolbar">
      <span style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase">Période N</span>
      <input type="date" id="dNfrom" class="dt"> <span style="color:var(--t3)">→</span> <input type="date" id="dNto" class="dt">
      <span style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-left:10px">N-1</span>
      <input type="date" id="dCfrom" class="dt"> <span style="color:var(--t3)">→</span> <input type="date" id="dCto" class="dt">
      <button class="btn blue" id="applyDates">Appliquer</button>
      <button class="pb" data-range="yesterday">Hier</button>
      <button class="pb" data-range="7d">7 j</button>
      <button class="pb" data-range="30d">30 j</button>
      <button class="pb" data-range="month">Mois</button>
      <button class="pb on" id="datesAll">Tout</button>
      <span style="font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-left:14px">Dimension</span>
      <button class="pb on" data-dim="global">Global</button>
      <button class="pb" data-dim="fr">France</button>
      <button class="pb" data-dim="inter">International</button>
      <div class="spacer" style="flex:1"></div>
      <button class="btn blue" id="pdf">⬇ Télécharger en PDF</button>
    </div>
    <div class="note" id="metaNote"></div>
  </div>

  <!-- REPORT -->
  <div id="objBox" class="hidden"></div>
  <div id="report"></div>
</div>

<script src="/app.js"></script>
</body>
</html>

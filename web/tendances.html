<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BI Project — Tendances</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/fr.min.js"></script>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="hdr">
  <div id="logo">BI <b>Project</b></div>
  <nav class="toolbar" style="gap:6px;margin-left:6px">
    <a class="pb" href="/app.html" title="Reporting (tableaux de pilotage standard)">📊 Reporting</a>
    <a class="pb" href="/commerciale.html" title="Pilotage d'une opération commerciale">💰 Analyse commerciale</a>
    <a class="pb" href="/saison.html" title="Analyse de saison (période longue)">🏷️ Analyse de saison</a>
    <a class="pb" href="/objectifs.html" title="Objectifs & prévisions mensuelles">🎯 Objectifs</a>
    <a class="pb" href="/anticipation.html" title="Prévisionnel : préparer la période N à partir de l'historique N-1">🔮 Prévisionnel</a>
    <a class="pb on" href="/tendances.html" title="Analyses sur le temps long (N vs N-1)">📈 Tendances</a>
  </nav>
  <div class="spacer"></div>
  <span id="who" style="font-size:12px;color:var(--t2)"></span>
  <a class="btn" href="/creation.html" title="Création & atelier de tableaux">🧱</a>
  <a class="btn" href="/feedback.html" title="Retours & idées">💬</a>
  <button class="btn hidden" id="adminBtn" title="Administration des comptes">👤 Admin</button>
  <button class="btn" id="logout">Déconnexion</button>
</div>

<div class="wrap layout-side no-rightnav">
  <aside id="setupCol">
    <!-- 1 · PÉRIODE -->
    <div class="card setup-card">
      <h3>1 · Période (temps long)</h3>
      <div class="note">Choisis la profondeur à analyser. Idéalement <b>~1 an</b> en N et l'<b>année N-1</b> juste avant.</div>
      <label class="setlabel">Période N — début → fin (1 calendrier)</label>
      <input id="nRange" class="dt" style="width:100%;cursor:pointer" placeholder="Choisir la période N…" readonly>
      <label class="setlabel" style="margin-top:7px">Période N-1 — début → fin (1 calendrier)</label>
      <input id="n1Range" class="dt" style="width:100%;cursor:pointer" placeholder="Choisir la période N-1…" readonly>
      <label class="setlabel" style="margin-top:7px">Filtre URL (optionnel — comme GA4)</label>
      <input id="urlFilter" class="dt" style="width:100%" placeholder="Ex. /soldes, /robes…">
      <button class="btn blue" id="run" style="margin-top:10px;width:100%">📈 Analyser</button>
      <div class="note" id="tnote" style="margin-top:6px"></div>
    </div>

    <!-- 2 · CHARGEMENT DES DONNÉES (composant commun) -->
    <div id="dataBar"></div>
  </aside>

  <main id="mainCol">
    <div id="body">
      <div class="card"><div class="note">Choisis une période puis « Analyser ».</div></div>
    </div>
  </main>
</div>

<script src="/databar.js"></script>
<script src="/tendances.js"></script>
</body>
</html>

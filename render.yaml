# Blueprint Render — BiDash V2 (mode sans base de données)
# Déploiement : "New +" → "Blueprint" sur Render, sélectionner le repo.
# Définir ADMIN_PASSWORD dans le dashboard Render (non versionné).
#
# NB : pas de base PostgreSQL ici (le free tier Render limite à 1 base gratuite).
# Les données déposées vivent en mémoire le temps de la session serveur ; archiver via l'export PDF.
# Pour réactiver la persistance plus tard : ajouter un bloc "databases:" + la variable DATABASE_URL.

services:
  - type: web
    name: bidash
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: Vincent
      - key: ADMIN_PASSWORD
        sync: false          # à saisir manuellement dans le dashboard Render

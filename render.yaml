# Blueprint Render — BiDash V2
# Déploiement : "New +" → "Blueprint" sur Render, sélectionner le repo.
# Les secrets (sync: false) se saisissent dans le dashboard Render (jamais versionnés).
#
# PERSISTANCE : DATABASE_URL (Postgres/Neon) est déclarée ci-dessous en sync:false.
#   → saisir la connection string Neon UNE fois dans le dashboard Render.
#   ⚠️ La déclarer ICI est indispensable : une variable ajoutée à la main mais ABSENTE du
#      Blueprint est EFFACÉE à chaque resynchronisation → données perdues (mode mémoire).
#   Sans valeur = mode mémoire (données perdues à la veille du serveur).

services:
  - type: web
    name: bidash
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: Vincent
      - key: ADMIN_PASSWORD
        sync: false          # à saisir manuellement dans le dashboard Render
      # Persistance Postgres (Neon) — saisir la connection string dans le dashboard.
      # Indispensable pour que les données survivent aux mises en veille / redéploiements.
      - key: DATABASE_URL
        sync: false
      # Connecteur GA4 (optionnel, cf. ADR-007) :
      - key: GA4_PROPERTY_ID
        value: "358326945"
      # + déposer la clé du service account en "Secret File" nommé ga4.json
      #   (ou définir GA4_SA_KEY en base64). Jamais versionné.
      - key: GA4_SA_KEY
        sync: false
